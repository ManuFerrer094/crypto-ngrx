@if (vm$ | async; as vm) {
  <section class="detail-page">
    <div class="detail-page__toolbar">
      <button type="button" class="detail-page__back" (click)="goBack()">Back to dashboard</button>
      <app-connection-status-badge
        [status]="vm.connectionStatus"
        [reconnectInMs]="vm.reconnectInMs"
      />
    </div>

    @if (vm.error) {
      <section class="detail-page__notice">
        <p>{{ vm.error }}</p>
      </section>
    }

    @if (vm.market; as market) {
      <app-market-detail-card [market]="market" (toggleFavorite)="toggleWatchlist($event)" />
    }
  </section>
}
