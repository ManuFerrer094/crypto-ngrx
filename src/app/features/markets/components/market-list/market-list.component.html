<mf-table
  [title]="title"
  [description]="subtitle"
  [columns]="columns"
  [data]="tableData"
  [showSearch]="true"
  [searchLabel]="'Search markets'"
  [searchPlaceholder]="'Search by symbol, pair, asset or status'"
  variant="bordered"
  density="comfortable"
  [showPaginator]="markets.length > 8"
  [pageSize]="8"
  [pageSizeOptions]="[8, 16, 24]"
  [showFirstLastButtons]="true"
  emptyTitle="No markets to show"
  [emptyDescription]="emptyMessage"
  rowActionHeader="Actions"
  rowActionLabel="Market actions"
  [rowActions]="rowActions"
  (mfAction)="handleAction($event)"
/>
